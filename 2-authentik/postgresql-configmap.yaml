apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-postgresql-configuration
  namespace: "default"
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: 18.3.0
    app.kubernetes.io/component: primary
data:
  postgresql.conf: |
    listen_addresses = '*'
    port = '5432'
    wal_level = 'replica'
    fsync = 'on'
    hot_standby = 'on'
    log_connections = 'false'
    log_disconnections = 'false'
    log_hostname = 'false'
    client_min_messages = 'error'
    include_dir = 'conf.d'

  pg_hba.conf: |
    host     all             all             0.0.0.0/0               scram-sha-256
    host     all             all             ::/0                    scram-sha-256
    local    all             all                                     scram-sha-256
    host     all             all        127.0.0.1/32                 scram-sha-256
    host     all             all        ::1/128                      scram-sha-256
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-postgresql-extended-configuration
  namespace: "default"
  labels:
    app.kubernetes.io/instance: authentik
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/version: 18.3.0
    app.kubernetes.io/component: primary
data:
  override.conf: |-
    max_connections = 500
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init-scripts
data:
  80-enable-pgcrypto.sh: |
    #!/usr/bin/env sh
    set -e
    echo "Enable pgcrypto extension..."
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
        CREATE SCHEMA IF NOT EXISTS crypto AUTHORIZATION $POSTGRES_USER;
        CREATE EXTENSION IF NOT EXISTS pgcrypto WITH SCHEMA crypto;
    EOSQL
