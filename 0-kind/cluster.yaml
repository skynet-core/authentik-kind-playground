kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  ipFamily: dual
  kubeProxyMode: nftables
nodes:
  - role: control-plane
    extraPortMappings:
      - containerPort: 30010
        hostPort: 9180
        protocol: TCP
      - containerPort: 30011
        hostPort: 9543
        protocol: TCP
